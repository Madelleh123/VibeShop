<svg width="300" height="120" viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="120" rx="15" fill="url(#bgGradient)"/>

  <!-- Shopping cart icon -->
  <g transform="translate(20, 25)">
    <circle cx="15" cy="35" r="3" fill="#fff"/>
    <circle cx="35" cy="35" r="3" fill="#fff"/>
    <path d="M10 25 L40 25 L35 15 L15 15 Z" fill="none" stroke="#fff" stroke-width="2"/>
    <path d="M12 15 L12 10 M18 15 L18 10 M24 15 L24 10 M30 15 L30 10 M36 15 L36 10" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- WhatsApp phone icon -->
  <g transform="translate(70, 20)">
    <rect x="0" y="10" width="25" height="35" rx="5" fill="#25D366"/>
    <rect x="5" y="15" width="15" height="20" rx="2" fill="#fff"/>
    <circle cx="12.5" cy="40" r="2" fill="#25D366"/>
  </g>

  <!-- AI brain/spark icon -->
  <g transform="translate(110, 25)">
    <path d="M5 15 Q15 5 25 15 Q25 25 15 20 Q5 25 5 15" fill="#FFD700" stroke="#FFA500" stroke-width="1"/>
    <circle cx="8" cy="12" r="1.5" fill="#FF6B35"/>
    <circle cx="18" cy="10" r="1.5" fill="#FF6B35"/>
    <circle cx="22" cy="18" r="1.5" fill="#FF6B35"/>
  </g>

  <!-- Main text -->
  <text x="150" y="45" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#textGradient)">VibeShop</text>

  <!-- Tagline -->
  <text x="150" y="70" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" opacity="0.9">AI Commerce for Africa</text>

  <!-- African continent outline (simplified) -->
  <g transform="translate(220, 80)" opacity="0.7">
    <path d="M10 5 Q15 2 20 5 Q25 8 22 12 Q18 15 15 12 Q12 9 10 5" fill="#FFD700" stroke="#FFA500" stroke-width="0.5"/>
    <text x="15" y="20" font-size="8" fill="#FFD700" text-anchor="middle">🇺🇬🇰🇪🇹🇿</text>
  </g>
</svg>