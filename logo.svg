<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="120" rx="20" fill="url(#bgGradient)"/>

  <!-- Modern geometric icon design -->
  <g transform="translate(30, 30)">
    <!-- Shopping bag shape -->
    <path d="M15 5 L25 5 L22 15 L18 15 Z" fill="url(#iconGradient)" stroke="#fff" stroke-width="1"/>
    <path d="M17 15 L17 25 M21 15 L21 25" stroke="url(#iconGradient)" stroke-width="2"/>
    <circle cx="19" cy="8" r="1.5" fill="#fff"/>

    <!-- Connection lines (representing WhatsApp/AI connectivity) -->
    <path d="M35 10 Q45 5 55 10 Q45 15 35 10" fill="none" stroke="#fff" stroke-width="2"/>
    <circle cx="35" cy="10" r="2" fill="#25D366"/>
    <circle cx="55" cy="10" r="2" fill="#25D366"/>
    <circle cx="45" cy="7" r="1.5" fill="#FFD700"/>

    <!-- AI neural network dots -->
    <circle cx="70" cy="12" r="1.5" fill="#FFD700"/>
    <circle cx="75" cy="8" r="1.5" fill="#FFD700"/>
    <circle cx="80" cy="15" r="1.5" fill="#FFD700"/>
    <circle cx="85" cy="10" r="1.5" fill="#FFD700"/>
    <!-- Connection lines -->
    <path d="M70 12 L75 8 L80 15 L85 10" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.7"/>
  </g>

  <!-- Main brand text -->
  <text x="140" y="50" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="url(#textGradient)">VibeShop</text>

  <!-- Tagline with modern styling -->
  <text x="140" y="75" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.9" font-weight="300">AI Commerce for Africa</text>

  <!-- African-inspired pattern -->
  <g transform="translate(320, 20)" opacity="0.8">
    <!-- Kente-inspired geometric pattern -->
    <rect x="0" y="0" width="4" height="4" fill="#FFD700"/>
    <rect x="6" y="0" width="4" height="4" fill="#FFD700"/>
    <rect x="12" y="0" width="4" height="4" fill="#FFD700"/>
    <rect x="3" y="6" width="4" height="4" fill="#FFD700"/>
    <rect x="9" y="6" width="4" height="4" fill="#FFD700"/>
    <rect x="0" y="12" width="4" height="4" fill="#FFD700"/>
    <rect x="6" y="12" width="4" height="4" fill="#FFD700"/>
    <rect x="12" y="12" width="4" height="4" fill="#FFD700"/>
  </g>

  <!-- Subtle wave pattern -->
  <path d="M0 100 Q100 90 200 100 T400 100 L400 120 L0 120 Z" fill="#ffffff" opacity="0.1"/>
</svg>