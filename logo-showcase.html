<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeShop Logo Showcase</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 40px;
            text-align: center;
        }

        .logo-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,.1);
            max-width: 600px;
            margin: 0 auto;
        }

        .logo-svg {
            width: 100%;
            max-width: 500px;
            height: auto;
            margin-bottom: 30px;
            filter: drop-shadow(0 10px 30px rgba(102,126,234,.3));
        }

        .logo-text {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            font-family: 'Arial Black', Arial, sans-serif;
            letter-spacing: -1px;
        }

        .tagline {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .feature {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .feature-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .feature h3 {
            margin: 0 0 8px 0;
            color: #333;
        }

        .feature p {
            margin: 0;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <!-- SVG Logo -->
        <img src="logo.svg" alt="VibeShop Logo" class="logo-svg">

        <!-- Text Logo -->
        <div class="logo-text">🛍️ VibeShop</div>
        <div class="tagline">AI-Powered Commerce Platform for African Markets</div>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">🤳</div>
                <h3>WhatsApp First</h3>
                <p>Customers shop directly via WhatsApp</p>
            </div>
            <div class="feature">
                <div class="feature-icon">🔍</div>
                <h3>AI Image Search</h3>
                <p>Find products by uploading photos</p>
            </div>
            <div class="feature">
                <div class="feature-icon">💰</div>
                <h3>Easy Payments</h3>
                <p>USSD payments across Africa</p>
            </div>
            <div class="feature">
                <div class="feature-icon">🌍</div>
                <h3>Local Focus</h3>
                <p>Built for African market sellers</p>
            </div>
        </div>
    </div>
</body>
</html>
