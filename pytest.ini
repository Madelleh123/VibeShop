[pytest]
# Pytest configuration for VibeShop

# Test discovery
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Markers
markers =
    integration: Integration tests requiring database
    slow: Slow running tests
    security: Security tests
    unit: Unit tests

# Test paths
testpaths = tests

# Minimum Python version
minversion = 3.10

# Timeout for tests (in seconds)
timeout = 300
